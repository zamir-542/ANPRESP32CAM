<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlateScope — collect frames</title>
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --err: #f85149;
      --ok: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .hint { color: var(--muted); font-size: 0.85rem; margin: 0 0 16px; }
    #plate {
      width: 100%; padding: 14px; font-size: 1.4rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; text-align: center;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: var(--text); background: var(--card);
      border: 1px solid var(--border); border-radius: 12px;
    }
    #plate:focus { outline: none; border-color: var(--accent); }
    #status { display: block; text-align: center; margin: 12px 0; min-height: 1.2rem;
      color: var(--muted); font-size: 0.9rem; }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--err); }
    .count { color: var(--muted); font-size: 0.85rem; margin: 16px 0 6px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 6px;
    }
    a { color: var(--accent); font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Collect tuning frames</h1>
  <p class="hint">
    Aim the ESP32 at a plate, type the plate, press <b>Enter</b>. The frame is
    captured and saved to <code>test_frames/</code> named by the plate — no
    recognition. Then run <code>python recognize_test.py test_frames</code>.
  </p>

  <input id="plate" autofocus autocomplete="off" autocapitalize="characters"
         spellcheck="false" placeholder="e.g. BHV33">
  <span id="status"></span>

  <div class="count" id="count">0 saved this session</div>
  <ul id="saved"></ul>

  <p><a href="/">← back to dashboard</a></p>

  <script>
    const input = document.getElementById('plate');
    const status = document.getElementById('status');
    const saved = document.getElementById('saved');
    const count = document.getElementById('count');
    let busy = false, n = 0;

    input.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter' || busy) return;
      const plate = input.value.trim();
      if (!plate) return;
      busy = true;
      status.className = '';
      status.textContent = 'Capturing…';
      try {
        const res = await fetch('/collect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ plate })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          status.className = 'ok';
          status.textContent = 'Saved ' + data.saved;
          const li = document.createElement('li');
          li.textContent = data.saved;
          saved.prepend(li);
          count.textContent = (++n) + ' saved this session';
          input.value = '';
        } else {
          status.className = 'err';
          status.textContent = 'Failed: ' + (data.reason || res.status);
        }
      } catch (err) {
        status.className = 'err';
        status.textContent = 'Failed: network';
      }
      busy = false;
      input.focus();
    });
  </script>
</body>
</html>
